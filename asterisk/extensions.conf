;==============================================================
; switchboard — dialplan
;   Inbound MaxoTel DID -> CLID allowlist -> AudioSocket(agent) | reject
;   HT802 handset       -> *99            -> AudioSocket(agent)
;   (No general PSTN outbound on this trunk — toll-fraud guard.)
;==============================================================
#include globals.conf

[from-maxotel]
exten => _X.,1,NoOp(switchboard inbound: ${CALLERID(num)} -> ${EXTEN})
 same => n,GotoIf($["${CALLERID(num):-9}" = "${ALLOWED_CLID_9}"]?agent:reject)
 same => n(agent),Answer()
 same => n,AudioSocket(${AS_ID},${AUDIOSOCKET_HOST}:${AUDIOSOCKET_PORT})
 same => n,Hangup()
 same => n(reject),NoOp(switchboard blocked CLID ${CALLERID(num)})
 same => n,Hangup(21)

[from-ht802]
exten => *99,1,Answer()
 same => n,AudioSocket(${AS_ID},${AUDIOSOCKET_HOST}:${AUDIOSOCKET_PORT})
 same => n,Hangup()
; Intentionally NO `_X. => Dial(PJSIP/...@maxotel)`: this trunk is not a PSTN relay.
